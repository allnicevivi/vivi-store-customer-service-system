[pytest]
testpaths = backend/tests
pythonpath = backend
addopts = -v --tb=short

# Always show logs (including DEBUG) during pytest runs
log_cli = true
log_cli_level = DEBUG
log_cli_format = "[%(asctime)s] - [%(filename)s] - [%(funcName)s():%(lineno)d %(levelname)s] %(message)s"

markers =
    integration: marks tests that require running external services (Kafka, ChromaDB, MongoDB, Redis).
                 Start services with: docker-compose up kafka chromadb mongodb redis
                 Run with: pytest -m integration
